
site_name: CineInfini
site_url: https://github.com/CineInfini/Video_Quality_Auditor
repo_url: https://github.com/CineInfini/Video_Quality_Auditor
edit_uri: blob/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            show_category_heading: true
            heading_level: 2
            docstring_style: numpy

nav:
  - Home: index.md
  - API Reference:
      - CineInfini package: api/cineinfini.md
      - audit: api/cineinfini/audit.md
      - compare: api/cineinfini/compare.md
      - benchmark: api/cineinfini/benchmark.md
      - core:
          - metrics: api/cineinfini/core/metrics.md
          - embedding: api/cineinfini/core/embedding.md
          - face_detection: api/cineinfini/core/face_detection.md
          - coherence: api/cineinfini/core/coherence.md
      - io:
          - report: api/cineinfini/io/report.md
          - reader: api/cineinfini/io/reader.md
      - pipeline:
          - audit: api/cineinfini/pipeline/audit.md
